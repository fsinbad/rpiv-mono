<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-ask-user-question — Structured clarifying questions instead of guessing" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-ask-user-question — Structured clarifying questions instead of guessing</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #7A7468; }
      .dim { fill: #4A463F; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <rect x="64" y="56" width="1152" height="44" fill="#16120E"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-ask-user-question</text>

    <rect x="120" y="158" width="280" height="38" fill="#1F1B14"/>
    <text class="mono mint" x="138" y="184" font-size="20" font-weight="700">&#11013;  &#9632; Feature Type</text>
    <text class="mono" x="420" y="184" font-size="20"><tspan class="muted">&#9633; Design Tab    &#9633; Testing    &#9633; Release    </tspan><tspan class="ink">&#10003; Submit</tspan>  <tspan class="muted">&#10145;</tspan></text>

    <text class="mono ink" x="120" y="262" font-size="24" font-weight="700">Which real development task are we planning right now?</text>

    <text class="mono mint" x="120" y="328" font-size="24" font-weight="700">&#10095;  1.  Bug fix (Recommended)</text>
    <text class="mono muted" x="170" y="358" font-size="18">Patch a production issue with minimal risk and clear rollback.</text>

    <text class="mono ink" x="120" y="408" font-size="24" font-weight="700">   2.  New feature</text>
    <text class="mono muted" x="170" y="438" font-size="18">Implement a user-facing capability across API, UI, and tests.</text>

    <text class="mono ink" x="120" y="488" font-size="24" font-weight="700">   3.  Refactor</text>
    <text class="mono muted" x="170" y="518" font-size="18">Improve maintainability without changing external behavior.</text>

    <line x1="120" y1="568" x2="1160" y2="568" stroke="#2A2620"/>
    <text class="mono dim" x="120" y="598" font-size="14" letter-spacing="1.2">  6.  Chat about this</text>
    <text class="mono dim" x="120" y="630" font-size="14" letter-spacing="1.2">Enter to select  &#183;  &#8593;/&#8595; navigate  &#183;  Tab switch questions  &#183;  Esc cancel</text>

    <rect x="64" y="708" width="1152" height="36" fill="#16120E"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-ask-user-question</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">q 1/4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">pi 0.9.4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-ask-user-question</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
