<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="rpiv-warp — Native Warp terminal toasts for Pi Agent lifecycle events" preserveAspectRatio="xMidYMid meet">
  <title>rpiv-warp — Native Warp terminal toasts for Pi Agent lifecycle events</title>
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; }
      .ink { fill: #F4EFE6; }
      .muted { fill: #7A7468; }
      .dim { fill: #4A463F; }
      .accent { fill: #FF7A3D; }
      .mint { fill: #6FD0B8; }
    </style>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="31"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.04 0"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#070605" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="toastGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF7A3D" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF7A3D" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="wclip"><rect x="64" y="56" width="1152" height="688" rx="12"/></clipPath>
  </defs>

  <rect width="1280" height="800" fill="#070605"/>
  <rect width="1280" height="800" filter="url(#grain)" opacity="0.45"/>
  <rect width="1280" height="800" fill="url(#vignette)"/>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="#0E0D0B" filter="url(#winShadow)"/>

  <g clip-path="url(#wclip)">
    <rect x="64" y="56" width="1152" height="44" fill="#16120E"/>
    <line x1="64" y1="100" x2="1216" y2="100" stroke="#2A2620"/>
    <circle cx="92"  cy="78" r="7" fill="#FF5F57"/>
    <circle cx="120" cy="78" r="7" fill="#FFBD2E"/>
    <circle cx="148" cy="78" r="7" fill="#28C840"/>
    <text class="mono muted" x="640" y="84" font-size="14" letter-spacing="1.4" text-anchor="middle">~/rpiv-mono &#8212; pi &#8212; rpiv-warp</text>

    <text class="mono mint" x="120" y="184" font-size="46" font-weight="700"># rpiv-warp</text>
    <text class="mono muted" x="120" y="222" font-size="20" letter-spacing="0.5">Native Warp toasts for Pi lifecycle events.</text>

    <text class="mono" x="120" y="298" font-size="22"><tspan class="dim">[hook]</tspan>   <tspan class="ink">agent_end</tspan> <tspan class="muted">fires</tspan></text>
    <text class="mono" x="120" y="358" font-size="22"><tspan class="dim">[bytes]</tspan>  <tspan class="accent" font-weight="700">ESC</tspan> <tspan class="muted">]</tspan> <tspan class="accent" font-weight="700">777</tspan> <tspan class="muted">; notify ;</tspan> <tspan class="mint">"Pi Agent"</tspan> <tspan class="muted">;</tspan> <tspan class="mint">"done"</tspan> <tspan class="accent" font-weight="700">BEL</tspan></text>
    <text class="mono" x="120" y="418" font-size="22"><tspan class="dim">[warp]</tspan>   <tspan class="mint">&#10003;</tspan> <tspan class="muted">toast delivered</tspan></text>

    <rect x="700" y="450" width="380" height="160" fill="url(#toastGlow)" rx="10"/>
    <rect x="720" y="466" width="340" height="128" fill="#13110D" stroke="#3A352D" stroke-width="1.5" rx="8"/>
    <circle cx="744" cy="494" r="6" fill="#FF7A3D"/>
    <text class="mono" x="760" y="498" font-size="13" letter-spacing="1.5"><tspan class="muted">PI AGENT</tspan> <tspan class="dim">&#183;</tspan> <tspan class="muted">via WARP</tspan></text>
    <text class="mono ink" x="740" y="540" font-size="20" font-weight="700">Input needed</text>
    <text class="mono mint" x="740" y="572" font-size="14" letter-spacing="1">&#9210; ask_user_question</text>

    <text class="mono dim" x="120" y="620" font-size="14" letter-spacing="2.2">SILENT NO-OP OUTSIDE WARP &#183; OPT-IN &#183; NO /dev/tty: OK</text>

    <rect x="64" y="708" width="1152" height="36" fill="#16120E"/>
    <line x1="64" y1="708" x2="1216" y2="708" stroke="#2A2620"/>
    <text class="mono" font-size="14" y="731" letter-spacing="1">
      <tspan x="92" class="accent" font-weight="700">&#9612; rpiv-warp</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="mint">TERM_PROGRAM=WarpTerminal</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">pi 0.9.4</tspan>
      <tspan dx="14" class="dim">&#9474;</tspan>
      <tspan dx="14" class="muted">npm:@juicesharp/rpiv-warp</tspan>
    </text>
  </g>

  <rect x="64" y="56" width="1152" height="688" rx="12" fill="none" stroke="#3A352D" stroke-width="1"/>
</svg>
